{{define "title"}}ログイン — CondoManager{{end}}

{{define "sidebar"}}{{end}}
{{define "topbar"}}{{end}}

{{define "content"}}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full space-y-8">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">CondoManager</h2>
      <p class="mt-2 text-center text-sm text-gray-600">アカウントにログイン</p>
    </div>

    {{if .Error}}
    <div class="rounded-md bg-red-50 border border-red-200 p-4">
      <p class="text-sm text-red-700">{{.Error}}</p>
    </div>
    {{end}}

    <form class="mt-8 space-y-6" method="POST" action="/login">
      <div class="rounded-md shadow-sm space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">メールアドレス</label>
          <input id="email" name="email" type="email" autocomplete="email" required
            value="{{.Email}}"
            class="mt-1 appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">パスワード</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required
            class="mt-1 appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
      </div>

      <div>
        <button type="submit"
          class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
          ログイン
        </button>
      </div>
    </form>
  </div>
</div>
{{end}}
