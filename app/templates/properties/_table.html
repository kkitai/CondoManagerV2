<tbody id="properties-table-body">
  {{range .Properties}}
  <tr>
    <td class="name-cell">
      <div class="name-inner">
        <div class="thumb">{{buildingThumb .ID}}</div>
        <a href="/properties/{{.ID}}">{{.Name}}</a>
      </div>
    </td>
    <td>{{.Address}}</td>
    <td class="num-mono">{{if .UnitCount}}{{derefInt .UnitCount}}戸{{else}}<span class="muted">-</span>{{end}}</td>
    <td>{{if .Assignee}}{{.Assignee.Name}}{{else}}<span class="muted">-</span>{{end}}</td>
    <td>
      {{if eq (string .Status) "active"}}
        <span class="pill green">管理中</span>
      {{else}}
        <span class="pill slate">非管理</span>
      {{end}}
    </td>
    <td class="muted num-mono">{{formatDate .UpdatedAt}}</td>
    <td>
      <div class="actions">
        <a href="/properties/{{.ID}}" class="iconbtn" title="詳細">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
        </a>
        <a href="/properties/{{.ID}}/edit" class="iconbtn" title="編集">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20h4l10-10-4-4L4 16v4Z"/><path d="m13.5 6.5 4 4"/></svg>
        </a>
      </div>
    </td>
  </tr>
  {{else}}
  <tr>
    <td colspan="7" style="text-align:center;padding:40px;color:var(--text-3)">物件が見つかりません</td>
  </tr>
  {{end}}
</tbody>
