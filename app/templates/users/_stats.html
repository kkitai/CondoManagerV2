{{define "_stats.html"}}
<div class="grid grid-cols-2 md:grid-cols-6 gap-4" id="user-stats">
  <div class="bg-white shadow rounded-lg p-4 text-center">
    <p class="text-2xl font-bold text-gray-900">{{.Total}}</p>
    <p class="text-xs text-gray-500 mt-1">合計</p>
  </div>
  <div class="bg-white shadow rounded-lg p-4 text-center">
    <p class="text-2xl font-bold text-green-600">{{.Active}}</p>
    <p class="text-xs text-gray-500 mt-1">有効</p>
  </div>
  <div class="bg-white shadow rounded-lg p-4 text-center">
    <p class="text-2xl font-bold text-yellow-600">{{.Invited}}</p>
    <p class="text-xs text-gray-500 mt-1">招待中</p>
  </div>
  <div class="bg-white shadow rounded-lg p-4 text-center">
    <p class="text-2xl font-bold text-gray-400">{{.Disabled}}</p>
    <p class="text-xs text-gray-500 mt-1">無効</p>
  </div>
  <div class="bg-white shadow rounded-lg p-4 text-center">
    <p class="text-2xl font-bold text-blue-600">{{.Admin}}</p>
    <p class="text-xs text-gray-500 mt-1">管理者</p>
  </div>
  <div class="bg-white shadow rounded-lg p-4 text-center">
    <p class="text-2xl font-bold text-indigo-600">{{.General}}</p>
    <p class="text-xs text-gray-500 mt-1">一般</p>
  </div>
</div>
{{end}}
